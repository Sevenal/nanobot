<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nanobot - AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="logo-emoji">🐈</span>
                <h1>nanobot</h1>
            </div>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Connecting...</span>
            </div>
        </header>

        <main class="chat-container">
            <div class="messages" id="messages">
                <div class="message system">
                    <div class="message-content">
                        Connecting to nanobot...
                    </div>
                </div>
            </div>

            <div class="input-area">
                <form id="chatForm" class="chat-form">
                    <input
                        type="text"
                        id="messageInput"
                        class="message-input"
                        placeholder="Type your message..."
                        autocomplete="off"
                        autofocus
                    >
                    <button type="submit" class="send-button" id="sendButton" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </form>
                <div class="quick-actions">
                    <button type="button" class="action-button" data-action="/new">New Chat</button>
                    <button type="button" class="action-button" data-action="/help">Help</button>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
